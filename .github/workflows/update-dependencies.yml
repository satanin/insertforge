name: Update dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6am UTC

jobs:
  update-deps:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Check for updates
        id: ncu
        run: |
          OUTPUT=$(npx -y npm-check-updates -u -t latest --filterVersion "/^[^=]/" --dep prod,dev,optional)
          echo "stdout<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Parse version changes
        id: parse
        run: |
          MAJOR_UPDATES=""
          OTHER_UPDATES=""

          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*$ ]] && continue
            [[ "$line" =~ "Checking" ]] && continue
            [[ "$line" =~ "Run" ]] && continue
            [[ "$line" =~ "Upgrading" ]] && continue
            [[ "$line" =~ "Using" ]] && continue

            # Match: package-name    ^1.2.3  →  ^2.0.0
            # Capture old major (group 1) and new major (group 2)
            if [[ "$line" =~ [[:space:]][\^~]?([0-9]+)\.[0-9]+\.[0-9]+[[:space:]]+→[[:space:]]+[\^~]?([0-9]+)\.[0-9]+\.[0-9]+ ]]; then
              OLD_MAJOR="${BASH_REMATCH[1]}"
              NEW_MAJOR="${BASH_REMATCH[2]}"

              if [[ "$OLD_MAJOR" != "$NEW_MAJOR" ]]; then
                MAJOR_UPDATES="${MAJOR_UPDATES}${line}"$'\n'
              else
                OTHER_UPDATES="${OTHER_UPDATES}${line}"$'\n'
              fi
            else
              OTHER_UPDATES="${OTHER_UPDATES}${line}"$'\n'
            fi
          done <<< "${{ steps.ncu.outputs.stdout }}"

          echo "major<<EOF" >> $GITHUB_OUTPUT
          echo "$MAJOR_UPDATES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "other<<EOF" >> $GITHUB_OUTPUT
          echo "$OTHER_UPDATES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [[ -n "$MAJOR_UPDATES" ]]; then
            echo "has_major=true" >> $GITHUB_OUTPUT
          else
            echo "has_major=false" >> $GITHUB_OUTPUT
          fi

      - name: Install new versions
        run: |
          pnpm install --no-frozen-lockfile
          git add .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          committer: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          title: 'chore: update dependencies'
          body: |
            Autogenerated PR to update dependencies.

            > **Note:** To run CI checks, go to Actions → CI → Run workflow and select this branch.

            ${{ steps.parse.outputs.has_major == 'true' && '## ⚠️ Major version changes' || '' }}
            ${{ steps.parse.outputs.has_major == 'true' && '```' || '' }}
            ${{ steps.parse.outputs.major }}${{ steps.parse.outputs.has_major == 'true' && '```' || '' }}

            ## All updates
            ```
            ${{ steps.ncu.outputs.stdout }}
            ```
          branch: update-dependencies-${{ github.run_id }}
